<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성일정보고등학교 오늘의 급식</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gugi&family=Noto+Sans+KR:wght@100..900&family=Orbitron:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Noto Sans KR", sans-serif;
            background: linear-gradient(160deg, #fff7ec 0%, #ffeed6 50%, #ffe0b8 100%);
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px;
        }

        .wrap {
            width: 100%;
            max-width: 560px;
        }

        /* 홈으로 돌아가기 버튼 */
        .home-btn {
            display: inline-block;
            margin-bottom: 24px;
            padding: 9px 20px;
            background-color: #fff;
            border: 2px solid #ff9f43;
            border-radius: 30px;
            color: #e67e22;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(230, 126, 34, 0.15);
            transition: all 0.3s;
        }

        .home-btn:hover {
            background-color: #ff9f43;
            color: #fff;
            transform: translateY(-2px);
        }

        /* 페이지 타이틀 */
        .page-head {
            text-align: center;
            margin-bottom: 26px;
            animation: fadeUp 0.6s ease both;
        }

        .page-head h1 {
            font-family: "Gugi", sans-serif;
            font-size: 2.1rem;
            color: #d35400;
            margin-bottom: 8px;
        }

        .page-head p {
            color: #b07a4f;
            font-weight: 500;
            letter-spacing: 3px;
            font-size: 0.95rem;
        }

        /* 디지털 시계 카드 */
        .clock-container {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            margin-bottom: 22px;
            box-shadow: 0 10px 24px rgba(30, 41, 59, 0.3);
            animation: fadeUp 0.6s ease 0.15s both;
            transition: transform 0.3s;
        }

        .clock-container:hover {
            transform: translateY(-4px);
        }

        .clock-title {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        #digital-clock {
            font-family: "Orbitron", monospace;
            font-size: 2.7rem;
            font-weight: 700;
            color: #4ade80;
            text-shadow: 0 0 14px rgba(74, 222, 128, 0.6);
            letter-spacing: 5px;
        }

        /* 급식 메뉴 카드 */
        .meal-card {
            background-color: #fff;
            border-radius: 18px;
            border-top: 6px solid #ff9f43;
            padding: 28px 26px;
            text-align: center;
            box-shadow: 0 10px 26px rgba(211, 84, 0, 0.13);
            animation: fadeUp 0.6s ease 0.3s both;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .meal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 32px rgba(211, 84, 0, 0.2);
        }

        /* 조회 날짜 배지 */
        #data-display {
            display: inline-block;
            background-color: #fff3e0;
            color: #e67e22;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        /* 메뉴판 (영수증 느낌) */
        #meal-box {
            font-family: "Noto Sans KR", sans-serif;
            font-size: 1.12rem;
            line-height: 2.1;
            color: #4a3526;
            white-space: pre-wrap;
            word-break: keep-all;
            background-color: #fffaf3;
            border-top: 2px dashed #f0c9a0;
            border-bottom: 2px dashed #f0c9a0;
            padding: 20px 8px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 모바일 화면 */
        @media (max-width: 480px) {
            .page-head h1 {
                font-size: 1.6rem;
            }

            #digital-clock {
                font-size: 2rem;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="wrap">
        <a href="index.html" class="home-btn">← 홈으로</a>

        <header class="page-head">
            <h1>🍱 오늘의 급식</h1>
            <p>성일정보고등학교 식단 안내</p>
        </header>

        <section class="clock-container">
            <h3 class="clock-title">현재 실시간 시간</h3>
            <div id="digital-clock">00:00:00</div>
        </section>

        <section class="meal-card">
            <h3 id="data-display">조회 중...</h3>
            <pre id="meal-box">급식을 실시간으로 불러오는 중입니다...</pre>
        </section>
    </div>

    <script>
        //여기부터 시간 코드
        const updateClock = () => {
            const now = new Date();

            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            if(hours < 10) hours = '0' + hours;
            if(minutes < 10) minutes = '0' + minutes;
            if(seconds < 10) seconds = '0' + seconds;

            document.querySelector('#digital-clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        //시계 무한반복 타이머 등록
        setInterval(updateClock,1000);


        //여기부터 급식 코드
        const today = new Date();
        const year = today.getFullYear();

        let month = today.getMonth()+1;
        if(month < 10){
            month = '0' + month;
        }

        let date = today.getDate();
        if(date <10){
            date = '0'+date
        }

        const todayString = `${year}${month}${date}`;

        document.querySelector('#data-display').textContent = `조회날짜: ${year}년 ${month}월 ${date}일 (${todayString})`;

        const getTodayMeal = async () => {
            const myApiKey = "508c0e34aea24e958f2d582483db12a7";
            const officeCode = "J10";
            const school = "7530591";

            const url = `https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${myApiKey}&Type=json&ATPT_OFCDC_SC_CODE=${officeCode}&SD_SCHUL_CODE=${school}`;

            try{
                const response = await fetch(url);
                const data = await response.json();

                if(data.mealServiceDietInfo){
                    const mealRow = data.mealServiceDietInfo[1].row[0];
                    const cleanMenu = mealRow.DDISH_NM.replace(/<br\/>/g, '\n');
                    const calories = mealRow.CAL_INFO;

                    document.querySelector('#meal-box').textContent = `${cleanMenu}\n\n[총 칼로리: ${calories}]`;
                }else{
                    document.querySelector('#meal-box').textContent = '오늘 일자에는 급식이 없습니다. (주말 또는 공휴일)';
                }
            } catch(error){
                document.querySelector('#meal-box').textContent = '서버 통신 실패! 인터넷 연결이나 코드를 다시 확인하세요'
                console.error('비동신 통신 에러 로그',error)
            }

        }

            document.addEventListener('DOMContentLoaded',getTodayMeal);
</script>
</body>
</html>
